<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BorderlineTAF v0.2</title>
  <style>
    :root { --bg:#111; --card:#1e1e1e; --fg:#f4f4f4; --muted:#b0b0b0; --accent:#67d4ff; }
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { margin:0; background:var(--bg); color:var(--fg); }
    .wrap { min-height:100vh; display:flex; flex-direction:column; }
    nav { position:sticky; top:0; background:#000; padding:.5rem; display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; }
    nav button, .btn { border:0; border-radius:10px; padding:.7rem; background:#2b2b2b; color:var(--fg); }
    nav button.active { background:var(--accent); color:#000; font-weight:700; }
    main { padding:.7rem; }
    .panel { display:none; }
    .panel.active { display:block; }
    .card { background:var(--card); border-radius:12px; padding:.8rem; margin-bottom:.7rem; }
    textarea { width:100%; min-height:160px; border-radius:10px; border:1px solid #444; background:#0f0f0f; color:var(--fg); padding:.6rem; }
    .row { display:flex; flex-wrap:wrap; gap:.5rem; }
    .status { position:sticky; bottom:0; background:#000; color:var(--accent); padding:.7rem; font-size:.95rem; }
    .muted { color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>
<div class="wrap">
  <nav>
    <button data-panel="snippets" class="active">Snippets</button>
    <button data-panel="ai">AI</button>
    <button data-panel="docs">Docs</button>
    <button data-panel="capture">Capture</button>
  </nav>
  <main>
    <section id="snippets" class="panel active"></section>
    <section id="ai" class="panel"></section>
    <section id="docs" class="panel"></section>
    <section id="capture" class="panel"></section>
  </main>
  <div id="status" class="status">Bereit zum Einfügen</div>
</div>
<script>
const fallbackSnippets=[{title:'Fallback Snippet',content:'Fallback aktiv.'}];
const aiTargets=[['ChatGPT','https://chatgpt.com'],['Claude','https://claude.ai'],['Gemini','https://gemini.google.com'],['NotebookLM','https://notebooklm.google.com']];
const docTags=[
'DOC:PROJECT=CatchIt;TYPE=Inbox;FORMAT=md','DOC:PROJECT=Inki;TYPE=Design;FORMAT=md','DOC:PROJECT=FLOW;TYPE=FLOWINPUT;FORMAT=txt','DOC:PROJECT=Pharos;TYPE=Forge;FORMAT=md','DOC:PROJECT=Borderline;TYPE=Spec;FORMAT=md'];

const state={snippets:[],lastFileRef:''};
const $=s=>document.querySelector(s);
const setStatus=t=>$('#status').textContent=t;

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $('#'+b.dataset.panel).classList.add('active');
});

async function loadJson(path,fallback){ try{ const r=await fetch(path); if(!r.ok) throw 0; return await r.json(); }catch{ return fallback; } }

async function copyWithFallback(text){
  try {
    if(window.Tasker && typeof window.Tasker.performTask==='function'){
      window.Tasker.performTask('setClipboard', {text});
      setStatus('Full Text Copy · Bereit zum Einfügen'); return;
    }
  } catch(_) {}
  try {
    await navigator.clipboard.writeText(text);
    setStatus('Full Text Copy · Bereit zum Einfügen'); return;
  } catch(_) {}
  const blob=new Blob([text],{type:'text/plain'});
  const name='BORDERLINE_'+Date.now()+'.txt';
  const url=URL.createObjectURL(blob);
  state.lastFileRef=`${name} -> ${url}`;
  try { await navigator.clipboard.writeText(state.lastFileRef); setStatus('File Reference Copy · Dateiverweis kopiert'); }
  catch { setStatus('Saved Only · Datei vorbereitet, aber nicht kopiert'); }
}

function renderSnippets(){
  const root=$('#snippets'); root.innerHTML='';
  state.snippets.forEach(s=>{
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`<strong>${s.title||'Ohne Titel'}</strong><p class="muted">${(s.content||'').slice(0,120)}</p><button class="btn">Kopieren</button>`;
    d.querySelector('button').onclick=()=>copyWithFallback(s.content||'');
    root.appendChild(d);
  });
}

function renderAI(){
  const root=$('#ai'); root.innerHTML='<div class="card"><div class="row"></div></div>';
  const row=root.querySelector('.row');
  aiTargets.forEach(([label,url])=>{ const b=document.createElement('button'); b.className='btn'; b.textContent=label; b.onclick=()=>window.open(url,'_blank'); row.appendChild(b); });
}

function renderDocs(){
  const root=$('#docs'); root.innerHTML='';
  docTags.forEach(tag=>{ const d=document.createElement('div'); d.className='card'; d.innerHTML=`<div>${tag}</div><button class="btn">Tag kopieren</button>`;
    d.querySelector('button').onclick=()=>copyWithFallback(tag); root.appendChild(d);
  });
}

function flowName(){ const d=new Date(); const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); const n=String(Math.floor(Math.random()*100000)).padStart(5,'0'); return `FLOWINPUT_${y}${m}${day}_${n}.txt`; }
function renderCapture(){
  const root=$('#capture');
  root.innerHTML=`<div class="card"><textarea id="capText" placeholder="Capture-Text hier einfügen..."></textarea><div class="row"><button id="prep" class="btn">Als FLOWINPUT vorbereiten</button></div><p id="capInfo" class="muted"></p></div>`;
  $('#prep').onclick=async()=>{
    const text=$('#capText').value;
    const name=flowName();
    const tag='DOC:PROJECT=FLOW;TYPE=FLOWINPUT;FORMAT=txt';
    const payload=`${tag}\nFILE=${name}\n\n${text}`;
    const blob=new Blob([payload],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name; a.click();
    $('#capInfo').textContent=`${tag} | Datei vorbereitet: ${name}`;
    await copyWithFallback(payload);
  };
}

(async()=>{ state.snippets=await loadJson('./snippets.json',fallbackSnippets); renderSnippets(); renderAI(); renderDocs(); renderCapture();})();
</script>
</body>
</html>
